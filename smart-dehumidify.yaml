blueprint:
  name: "💧 Smart Entfeuchten via Klimaanlage (Heat-Cool-Zyklus)"
  description: >
    Nutzt eine Split-Klimaanlage zum effektiven Entfeuchten — auch wenn der
    Raum bereits kühl ist und der normale 'dry'-Modus nichts bringt.

    PRINZIP:
    • Eine Klima entfeuchtet nur wenn der Verdampfer deutlich unter dem
      Taupunkt liegt UND der Kompressor lange läuft.
    • Bei kühlem Raum (z. B. 20 °C) schaltet sie im cool/dry-Modus sofort ab
      → kein Wasser wird ausgeschieden.
    • Lösung: Raum erst AUFHEIZEN (Delta-T vergrößern), dann AGGRESSIV KÜHLEN
      → Kompressor läuft lange, Wasser kondensiert am Verdampfer.
    • Zyklus wiederholt bis rel. Feuchte, absolute Feuchte oder Taupunkt das
      Ziel erreichen.

    FEATURES:
    • Heat-Cool-Zyklus mit einstellbarer Heiz- und Kühltemperatur
    • Abbruch bei Ziel-rH / Ziel abs. Feuchte / Taupunkt erreicht
    • Außenvergleich: wenn draußen trockener → nur Lüften empfehlen
    • Fenstersperre, Zeitfenster, Anwesenheit
    • Maximale Laufzeit + maximale Anzahl Zyklen als Sicherheit
    • Push-Benachrichtigungen optional

  domain: automation
  author: "marco@disane.dev"
  homeassistant:
    min_version: "2024.6.0"

  input:

    # ═══════════════════════════════════════════════════════════════════════════
    # KLIMAANLAGE
    # ═══════════════════════════════════════════════════════════════════════════
    climate_entity:
      name: "Klimaanlage"
      description: "Die zu steuernde Klimaanlage (climate.*). Muss heat und cool unterstützen."
      selector:
        entity:
          domain: climate

    # ═══════════════════════════════════════════════════════════════════════════
    # RAUMSENSOREN
    # ═══════════════════════════════════════════════════════════════════════════
    room_temperature_sensor:
      name: "Raum-Temperatursensor"
      description: "Sensor für die aktuelle Raumtemperatur (°C)."
      selector:
        entity:
          domain: sensor
          device_class: temperature

    room_humidity_sensor:
      name: "Raum-Feuchtesensor (rel. Feuchte %)"
      description: "Sensor für die aktuelle relative Luftfeuchtigkeit im Raum."
      selector:
        entity:
          domain: sensor
          device_class: humidity

    # ═══════════════════════════════════════════════════════════════════════════
    # ZIELE — WANN GESTARTET / WANN FERTIG
    # ═══════════════════════════════════════════════════════════════════════════
    target_humidity:
      name: "Ziel: relative Feuchte (%)"
      description: >
        Unter diesen Wert soll die rel. Feuchte gebracht werden.
        Typisch: 55–60 % für Wohnräume.
      default: 55
      selector:
        number:
          min: 30
          max: 70
          step: 1
          unit_of_measurement: "%"
          mode: slider

    start_humidity:
      name: "Start: relative Feuchte (%)"
      description: >
        Ab dieser rel. Feuchte wird der Entfeuchtungs-Zyklus automatisch
        gestartet. Sollte deutlich über dem Ziel liegen.
      default: 65
      selector:
        number:
          min: 40
          max: 90
          step: 1
          unit_of_measurement: "%"
          mode: slider

    target_absolute_humidity:
      name: "Ziel: absolute Feuchte (g/m³)"
      description: >
        Zusätzliches Abbruchkriterium. Die rel. Feuchte kann steigen wenn es
        kälter wird, daher ist die absolute Feuchte das bessere Maß für
        'wirklich trocken'. Unter diesem Wert gilt der Raum als entfeuchtet.
        Typisch: 9–11 g/m³.
      default: 10
      selector:
        number:
          min: 5
          max: 15
          step: 0.5
          unit_of_measurement: "g/m³"
          mode: slider

    # ═══════════════════════════════════════════════════════════════════════════
    # HEAT-COOL-ZYKLUS PARAMETER
    # ═══════════════════════════════════════════════════════════════════════════
    heat_target_temp:
      name: "Aufheizen auf (°C)"
      description: >
        Zieltemperatur der Heizphase. Je höher desto effektiver die
        anschließende Kühl-Entfeuchtung. Typisch: 23–25 °C.
      default: 24
      selector:
        number:
          min: 20
          max: 28
          step: 0.5
          unit_of_measurement: "°C"
          mode: slider

    heat_phase_max_minutes:
      name: "Heizphase: maximale Dauer (Minuten)"
      description: >
        Maximale Laufzeit der Heizphase — falls die Zieltemperatur nicht
        erreicht wird (z. B. offene Tür). Danach wird direkt gekühlt.
      default: 30
      selector:
        number:
          min: 5
          max: 90
          step: 5
          unit_of_measurement: "min"
          mode: slider

    cool_target_temp:
      name: "Kühlen auf (°C)"
      description: >
        Aggressive Zieltemperatur der Kühlphase. Muss deutlich unter der
        Heiz-Zieltemperatur liegen damit der Kompressor lange durchläuft.
        Typisch: 17–19 °C.
      default: 18
      selector:
        number:
          min: 16
          max: 22
          step: 0.5
          unit_of_measurement: "°C"
          mode: slider

    cool_phase_max_minutes:
      name: "Kühlphase: maximale Dauer (Minuten)"
      description: >
        Maximale Laufzeit der Kühlphase pro Zyklus.
      default: 45
      selector:
        number:
          min: 10
          max: 120
          step: 5
          unit_of_measurement: "min"
          mode: slider

    min_room_temp_abort:
      name: "Abbruch-Temperatur Kühlphase (°C)"
      description: >
        Wenn der Raum so kalt wird, wird die Kühlphase sofort abgebrochen
        (Komfortschutz). Typisch: 17 °C.
      default: 17
      selector:
        number:
          min: 14
          max: 20
          step: 0.5
          unit_of_measurement: "°C"
          mode: slider

    fan_mode:
      name: "Lüfterstufe"
      description: >
        Lüfterstufe während Heizen und Kühlen. Höhere Stufen entfeuchten
        mehr Luft pro Zeit.
      default: "high"
      selector:
        select:
          options:
            - label: "Auto"
              value: "auto"
            - label: "Niedrig"
              value: "low"
            - label: "Mittel"
              value: "medium"
            - label: "Hoch"
              value: "high"

    max_cycles:
      name: "Maximale Anzahl Zyklen"
      description: >
        Sicherheitsgrenze: nach so vielen Heat-Cool-Zyklen wird abgebrochen
        auch wenn das Ziel nicht erreicht wurde.
      default: 3
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: slider

    # ═══════════════════════════════════════════════════════════════════════════
    # AUSSENVERGLEICH (OPTIONAL) — LÜFTEN STATT ENTFEUCHTEN
    # ═══════════════════════════════════════════════════════════════════════════
    use_outdoor_comparison:
      name: "Außenvergleich aktivieren?"
      description: >
        Vergleicht innen und außen die absolute Feuchte. Wenn draußen
        trockener ist, wird keine AC-Entfeuchtung gestartet sondern stattdessen
        eine Benachrichtigung zum Stoßlüften gesendet.
      default: false
      selector:
        boolean:

    outdoor_temperature_sensor:
      name: "Außen-Temperatursensor"
      default: {}
      selector:
        entity:
          domain: sensor
          device_class: temperature

    outdoor_humidity_sensor:
      name: "Außen-Feuchtesensor"
      default: {}
      selector:
        entity:
          domain: sensor
          device_class: humidity

    outdoor_advantage_min:
      name: "Mindest-Vorteil außen (g/m³)"
      description: >
        Wie viel trockener außen sein muss (in absoluter Feuchte) damit
        Lüften empfohlen wird statt AC-Entfeuchten.
      default: 1.5
      selector:
        number:
          min: 0.5
          max: 5
          step: 0.5
          unit_of_measurement: "g/m³"
          mode: slider

    # ═══════════════════════════════════════════════════════════════════════════
    # STOSSLÜFT-ERINNERUNG
    # ═══════════════════════════════════════════════════════════════════════════
    vent_reminder_enabled:
      name: "Stoßlüft-Erinnerung aktivieren?"
      description: >
        Wenn der Außenvergleich Lüften empfiehlt: warte auf Fenster-Öffnung
        und schicke eine Benachrichtigung sobald die Feuchte auf das Ziel
        gesunken ist (oder die maximale Lüftdauer erreicht wurde).
        Benötigt einen konfigurierten Fenstersensor.
      default: true
      selector:
        boolean:

    vent_wait_max_minutes:
      name: "Max. Wartezeit auf Fenster-Öffnung (Minuten)"
      description: >
        Wie lange nach der Lüft-Empfehlung maximal auf das Öffnen des
        Fensters gewartet wird. Wird kein Fenster geöffnet, passiert nichts.
      default: 15
      selector:
        number:
          min: 1
          max: 60
          step: 1
          unit_of_measurement: "min"
          mode: slider

    vent_duration_minutes:
      name: "Max. Lüftdauer (Minuten)"
      description: >
        Maximale Lüftdauer nach Fenster-Öffnung. Die Erinnerung kommt
        früher sobald das Feuchte-Ziel dynamisch erreicht wurde.
      default: 10
      selector:
        number:
          min: 1
          max: 60
          step: 1
          unit_of_measurement: "min"
          mode: slider

    # ═══════════════════════════════════════════════════════════════════════════
    # FENSTERSPERRE
    # ═══════════════════════════════════════════════════════════════════════════
    use_window_sensor:
      name: "Fenstersperre aktivieren?"
      description: "Entfeuchten wird gestoppt/nicht gestartet wenn das Fenster offen ist."
      default: false
      selector:
        boolean:

    window_sensor:
      name: "Fenstersensor"
      default: ""
      selector:
        entity:
          domain: binary_sensor
          device_class:
            - window
            - door
            - opening

    # ═══════════════════════════════════════════════════════════════════════════
    # ZEITFENSTER
    # ═══════════════════════════════════════════════════════════════════════════
    use_time_window:
      name: "Zeitfenster aktivieren?"
      description: "Entfeuchten nur innerhalb eines Zeitfensters erlauben."
      default: false
      selector:
        boolean:

    time_window_start:
      name: "Zeitfenster: Startzeit"
      default: "08:00:00"
      selector:
        time:

    time_window_end:
      name: "Zeitfenster: Endzeit"
      default: "22:00:00"
      selector:
        time:

    # ═══════════════════════════════════════════════════════════════════════════
    # HEIZUNGSSPERRE
    # ═══════════════════════════════════════════════════════════════════════════
    use_heating_interlock:
      name: "Heizungssperre aktivieren?"
      description: "Entfeuchten nicht starten wenn eine andere Heizung aktiv ist."
      default: false
      selector:
        boolean:

    heating_entity:
      name: "Heizungsgerät"
      default: ""
      selector:
        entity:
          domain:
            - climate
            - switch
            - binary_sensor

    # ═══════════════════════════════════════════════════════════════════════════
    # BENACHRICHTIGUNGEN
    # ═══════════════════════════════════════════════════════════════════════════
    notify_service:
      name: "Benachrichtigungsdienst (optional)"
      description: "z. B. notify.mobile_app_iphone. Leer lassen zum Deaktivieren."
      default: ""
      selector:
        text:


# ─────────────────────────────────────────────────────────────────────────────
# VARIABLEN
# ─────────────────────────────────────────────────────────────────────────────
variables:
  v_climate: !input climate_entity
  v_room_temp: !input room_temperature_sensor
  v_room_hum: !input room_humidity_sensor
  v_out_temp: !input outdoor_temperature_sensor
  v_out_hum: !input outdoor_humidity_sensor
  v_use_outdoor: !input use_outdoor_comparison
  v_use_window: !input use_window_sensor
  v_window: !input window_sensor
  v_use_time: !input use_time_window
  v_time_start: !input time_window_start
  v_time_end: !input time_window_end
  v_use_heat_lock: !input use_heating_interlock
  v_heating: !input heating_entity
  v_target_rh: !input target_humidity
  v_start_rh: !input start_humidity
  v_target_ah: !input target_absolute_humidity
  v_heat_target: !input heat_target_temp
  v_cool_target: !input cool_target_temp
  v_min_room: !input min_room_temp_abort
  v_max_cycles: !input max_cycles
  v_fan_mode: !input fan_mode
  v_out_advantage: !input outdoor_advantage_min
  v_vent_reminder: !input vent_reminder_enabled
  v_vent_wait_max: !input vent_wait_max_minutes
  v_vent_duration: !input vent_duration_minutes
  v_notify: !input notify_service


# ─────────────────────────────────────────────────────────────────────────────
# TRIGGER
# ─────────────────────────────────────────────────────────────────────────────
# Nur humidity_high — window_opened-Trigger wurde entfernt, damit der
# Vent-Reminder-Wait im Außenvergleichs-Zweig nicht von mode:single
# abgewürgt wird. Fenster-Detektion passiert inline in den wait_templates
# der Heiz-/Kühlphasen.
trigger:
  - platform: numeric_state
    entity_id: !input room_humidity_sensor
    above: !input start_humidity
    for:
      minutes: 2
    id: humidity_high


condition: []


# ─────────────────────────────────────────────────────────────────────────────
# AKTIONEN
# ─────────────────────────────────────────────────────────────────────────────
# Struktur wurde flachgezogen — frueher war ein choose/default mit einem
# FALL A "Fenster wurde geoeffnet" Branch, der vom window_opened Trigger
# ausgeloest wurde. Mit mode:single und entferntem Trigger ist das nicht
# mehr noetig; Fenster-Oeffnung wird inline in den wait_templates erkannt.
action:

  # ────────────────────────────────────────────────────────────────────────
  # VORCHECKS: Fenster, Zeitfenster, Heizung
  # ────────────────────────────────────────────────────────────────────────
  - variables:
      window_open: "{{ v_use_window | bool(false) and (v_window is string) and (v_window | length > 0) and is_state(v_window, 'on') }}"
      within_time: "{{ (not v_use_time) or (v_time_start <= now().strftime('%H:%M:%S') <= v_time_end) }}"
      heating_active: "{{ v_use_heat_lock | bool(false) and (v_heating is string) and (v_heating | length > 0) and ((state_attr(v_heating, 'hvac_action') == 'heating') if v_heating.startswith('climate.') else is_state(v_heating, 'on')) }}"

  - condition: template
    value_template: "{{ (not (window_open | bool(false))) and (within_time | bool(true)) and (not (heating_active | bool(false))) }}"

  # ────────────────────────────────────────────────────────────────────────
  # BERECHNUNG ABSOLUTE FEUCHTE (Magnus-Formel)
  # ────────────────────────────────────────────────────────────────────────
  - variables:
      room_t: "{{ states(v_room_temp) | float(0) }}"
      room_rh: "{{ states(v_room_hum) | float(0) }}"
      room_ah: >
        {% set T = states(v_room_temp) | float(0) %}
        {% set RH = states(v_room_hum) | float(0) %}
        {% set pws = 6.112 * (2.718281828 ** (17.62 * T / (243.12 + T))) %}
        {% set ah = 216.7 * (RH / 100 * pws) / (273.15 + T) %}
        {{ ah | round(2) }}
      out_ah: >
        {% if v_use_outdoor
              and (v_out_temp is string) and (v_out_temp | length > 0)
              and (v_out_hum is string) and (v_out_hum | length > 0) %}
          {% set T = states(v_out_temp) | float(0) %}
          {% set RH = states(v_out_hum) | float(0) %}
          {% set pws = 6.112 * (2.718281828 ** (17.62 * T / (243.12 + T))) %}
          {{ (216.7 * (RH / 100 * pws) / (273.15 + T)) | round(2) }}
        {% else %}
          99
        {% endif %}

  # ────────────────────────────────────────────────────────────────────────
  # Außenvergleich: wenn draußen trockener → Lüften empfehlen
  # + optionaler Stoßlüft-Reminder mit dynamischem Ziel-Check
  # ────────────────────────────────────────────────────────────────────────
  - if:
      - condition: template
        value_template: >
          {{ v_use_outdoor
             and (room_ah | float) - (out_ah | float) >= (v_out_advantage | float) }}
    then:
      - if:
          - condition: template
            value_template: "{{ v_notify != '' }}"
        then:
          - service: "{{ v_notify }}"
            data:
              title: "🪟 Lieber lüften!"
              message: >
                Innen {{ room_ah }} g/m³, außen nur {{ out_ah }} g/m³
                absolute Feuchte ({{ ((room_ah | float) - (out_ah | float)) | round(2) }} g/m³ Differenz).
                Stoßlüften bringt mehr als die Klimaanlage — AC-Entfeuchten
                wurde übersprungen.

      # Stoßlüft-Reminder: nur wenn aktiviert UND Fenstersensor konfiguriert
      - if:
          - condition: template
            value_template: >
              {{ v_vent_reminder | bool(false)
                 and (v_window is string) and (v_window | length > 0) }}
        then:
          # 1) Warte bis Fenster tatsächlich geöffnet wird (Timeout = vent_wait_max_minutes)
          - wait_template: "{{ is_state(v_window, 'on') }}"
            timeout:
              minutes: !input vent_wait_max_minutes
            continue_on_error: true

          # 2) Nur wenn das Fenster innerhalb des Timeouts geöffnet wurde
          - if:
              - condition: template
                value_template: "{{ wait.completed | default(false) | bool(false) }}"
            then:
              # Notify: "Lüften gestartet, warte auf Zielfeuchte"
              - if:
                  - condition: template
                    value_template: "{{ v_notify != '' }}"
                then:
                  - service: "{{ v_notify }}"
                    data:
                      title: "🪟 Lüften gestartet"
                      message: >
                        Fenster offen — warte bis die Feuchte auf
                        {{ v_target_rh }} % / {{ v_target_ah }} g/m³ gefallen ist
                        (max. {{ v_vent_duration }} min) oder das Fenster
                        wieder geschlossen wird.

              # 3) Warte dynamisch: Ziel erreicht ODER Fenster zu ODER Timeout
              - wait_template: >
                  {% set T = states(v_room_temp) | float(99) %}
                  {% set RH = states(v_room_hum) | float(100) %}
                  {% set pws = 6.112 * (2.718281828 ** (17.62 * T / (243.12 + T))) %}
                  {% set AH = 216.7 * (RH / 100 * pws) / (273.15 + T) %}
                  {{ RH <= (v_target_rh | float)
                     or AH <= (v_target_ah | float)
                     or is_state(v_window, 'off') }}
                timeout:
                  minutes: !input vent_duration_minutes
                continue_on_error: true

              # 4) Status auswerten und passende Notification schicken
              - variables:
                  vent_completed: "{{ wait.completed | default(false) | bool(false) }}"
                  vent_window_closed: "{{ is_state(v_window, 'off') }}"
                  vent_t: "{{ states(v_room_temp) | float(0) | round(1) }}"
                  vent_rh: "{{ states(v_room_hum) | float(0) | round(0) }}"
                  vent_ah: >-
                    {% set T = states(v_room_temp) | float(0) %}
                    {% set RH = states(v_room_hum) | float(0) %}
                    {% set pws = 6.112 * (2.718281828 ** (17.62 * T / (243.12 + T))) %}
                    {{ (216.7 * (RH / 100 * pws) / (273.15 + T)) | round(2) }}
                  vent_target_reached: >-
                    {% set T = states(v_room_temp) | float(99) %}
                    {% set RH = states(v_room_hum) | float(100) %}
                    {% set pws = 6.112 * (2.718281828 ** (17.62 * T / (243.12 + T))) %}
                    {% set AH = 216.7 * (RH / 100 * pws) / (273.15 + T) %}
                    {{ RH <= (v_target_rh | float) or AH <= (v_target_ah | float) }}

              - if:
                  - condition: template
                    value_template: "{{ v_notify != '' }}"
                then:
                  - choose:
                      # Ziel dynamisch erreicht — ideale Meldung
                      - conditions:
                          - condition: template
                            value_template: "{{ vent_target_reached | bool(false) }}"
                        sequence:
                          - service: "{{ v_notify }}"
                            data:
                              title: "✅ Lüft-Ziel erreicht — Fenster schließen"
                              message: >
                                {{ vent_t }} °C / {{ vent_rh }} % rH
                                ({{ vent_ah }} g/m³). Entfeuchtungsziel erreicht,
                                Fenster kann jetzt geschlossen werden.

                      # User hat Fenster schon geschlossen → kurze Info
                      - conditions:
                          - condition: template
                            value_template: "{{ vent_window_closed | bool(false) }}"
                        sequence:
                          - service: "{{ v_notify }}"
                            data:
                              title: "🪟 Fenster geschlossen"
                              message: >
                                Aktueller Stand: {{ vent_t }} °C /
                                {{ vent_rh }} % rH ({{ vent_ah }} g/m³).
                                Ziel {{ v_target_rh }} % / {{ v_target_ah }} g/m³
                                {{ '✅ erreicht' if vent_target_reached else '❌ noch nicht erreicht' }}.

                    # Fallback: Timeout erreicht, Fenster noch offen, Ziel nicht erreicht
                    default:
                      - service: "{{ v_notify }}"
                        data:
                          title: "⏰ {{ v_vent_duration }} min gelüftet"
                          message: >
                            {{ vent_t }} °C / {{ vent_rh }} % rH
                            ({{ vent_ah }} g/m³). Maximale Lüftdauer erreicht,
                            Ziel {{ v_target_rh }} % / {{ v_target_ah }} g/m³
                            noch nicht erreicht. Fenster kann trotzdem
                            geschlossen werden.

      - stop: "Außenluft ist trockener — Lüften empfohlen."

  # ────────────────────────────────────────────────────────────────────────
  # START-NOTIFICATION
  # ────────────────────────────────────────────────────────────────────────
  - if:
      - condition: template
        value_template: "{{ v_notify != '' }}"
    then:
      - service: "{{ v_notify }}"
        data:
          title: "💧 Entfeuchten startet"
          message: >
            Start: {{ room_t | round(1) }} °C /
            {{ room_rh | round(0) }} % rH
            ({{ room_ah }} g/m³). Ziel: <{{ v_target_rh }} % bzw.
            <{{ v_target_ah }} g/m³.

  # ────────────────────────────────────────────────────────────────────────
  # HEAT-COOL-ZYKLUS — bis zu max_cycles Durchläufe
  # ────────────────────────────────────────────────────────────────────────
  - repeat:
      count: !input max_cycles
      sequence:

        - variables:
            cycle_num: "{{ repeat.index }}"
            hvac_modes_list: "{{ state_attr(v_climate, 'hvac_modes') or [] }}"
            can_heat: "{{ 'heat' in (state_attr(v_climate, 'hvac_modes') or []) }}"
            can_cool: "{{ 'cool' in (state_attr(v_climate, 'hvac_modes') or []) }}"

        # Zyklus-Start Notification
        - if:
            - condition: template
              value_template: "{{ v_notify != '' }}"
          then:
            - service: "{{ v_notify }}"
              data:
                title: "🔁 Zyklus {{ cycle_num }}/{{ v_max_cycles }} startet"
                message: >
                  {% if can_heat %}
                  🔥 Heizphase: heize auf {{ v_heat_target }} °C
                  (aktuell {{ states(v_room_temp) | float | round(1) }} °C,
                  {{ states(v_room_hum) | float | round(0) }} % rH).
                  {% else %}
                  ⚠️ AC unterstützt kein 'heat' ({{ hvac_modes_list | join(', ') }})
                  — Heizphase wird übersprungen, starte direkt Kühlphase.
                  {% endif %}

        # ═══════ PHASE 1: HEIZEN (nur wenn AC heat kann) ═══════
        - if:
            - condition: template
              value_template: "{{ can_heat }}"
          then:
            - service: climate.turn_on
              target:
                entity_id: !input climate_entity
              continue_on_error: true
            - delay:
                seconds: 2
            - service: climate.set_temperature
              target:
                entity_id: !input climate_entity
              data:
                hvac_mode: "heat"
                temperature: !input heat_target_temp
              continue_on_error: true
            - delay:
                seconds: 2
            - service: climate.set_fan_mode
              target:
                entity_id: !input climate_entity
              data:
                fan_mode: !input fan_mode
              continue_on_error: true

            # Warte bis AC wirklich im heat-Modus ist (Cloud-Bestaetigung)
            - wait_template: >
                {{ state_attr(v_climate, 'hvac_mode') == 'heat'
                   or states(v_climate) == 'heat' }}
              timeout:
                seconds: 30
              continue_on_error: true

            # Warte bis Zieltemperatur erreicht ODER Fenster offen ODER Timeout
            - wait_template: >
                {% set win_open = v_use_window | bool(false) and (v_window is string) and (v_window | length > 0) and is_state(v_window, 'on') %}
                {{ (states(v_room_temp) | float(0) >= (v_heat_target | float) - 0.3) or win_open }}
              timeout:
                minutes: !input heat_phase_max_minutes
              continue_on_error: true

            # Heat-Phase beendet Notification
            - if:
                - condition: template
                  value_template: "{{ v_notify != '' }}"
              then:
                - service: "{{ v_notify }}"
                  data:
                    title: "🔥 Heizphase beendet"
                    message: >
                      Raum bei {{ states(v_room_temp) | float | round(1) }} °C,
                      {{ states(v_room_hum) | float | round(0) }} % rH.
                      Starte Kühlphase ❄️ auf {{ v_cool_target }} °C.

        # Frühabbruch wenn Fenster/Feuchte-Ziel bereits erreicht
        - if:
            - condition: template
              value_template: "{{ (v_use_window | bool(false) and (v_window is string) and (v_window | length > 0) and is_state(v_window, 'on')) or (states(v_room_hum) | float(100) <= (v_target_rh | float)) }}"
          then:
            - service: climate.turn_off
              target:
                entity_id: !input climate_entity
              continue_on_error: true
            - stop: "Ziel erreicht oder Fenster offen — Zyklus beenden."

        # ═══════ PHASE 2: KÜHLEN (aggressiv entfeuchten) ═══════
        - service: climate.turn_on
          target:
            entity_id: !input climate_entity
          continue_on_error: true
        - delay:
            seconds: 2
        - service: climate.set_temperature
          target:
            entity_id: !input climate_entity
          data:
            hvac_mode: "cool"
            temperature: !input cool_target_temp
          continue_on_error: true
        - delay:
            seconds: 2
        - service: climate.set_fan_mode
          target:
            entity_id: !input climate_entity
          data:
            fan_mode: !input fan_mode
          continue_on_error: true

        # Warte bis AC wirklich im cool-Modus ist (Cloud-Bestaetigung)
        - wait_template: >
            {{ state_attr(v_climate, 'hvac_mode') == 'cool'
               or states(v_climate) == 'cool' }}
          timeout:
            seconds: 30
          continue_on_error: true

        # Warte bis eines der Abbruchkriterien zutrifft
        - wait_template: >
            {% set T = states(v_room_temp) | float(99) %}
            {% set RH = states(v_room_hum) | float(100) %}
            {% set pws = 6.112 * (2.718281828 ** (17.62 * T / (243.12 + T))) %}
            {% set AH = 216.7 * (RH / 100 * pws) / (273.15 + T) %}
            {% set win_open = v_use_window | bool(false) and (v_window is string) and (v_window | length > 0) and is_state(v_window, 'on') %}
            {{ RH <= (v_target_rh | float)
               or AH <= (v_target_ah | float)
               or T <= (v_min_room | float)
               or win_open }}
          timeout:
            minutes: !input cool_phase_max_minutes
          continue_on_error: true

        # Zyklus-Ende Notification (Status nach Kühlphase)
        - if:
            - condition: template
              value_template: "{{ v_notify != '' }}"
          then:
            - service: "{{ v_notify }}"
              data:
                title: "❄️ Zyklus {{ cycle_num }}/{{ v_max_cycles }} Kühlphase beendet"
                message: >
                  Raum: {{ states(v_room_temp) | float | round(1) }} °C /
                  {{ states(v_room_hum) | float | round(0) }} % rH
                  ({% set T = states(v_room_temp) | float(0) %}{% set RH = states(v_room_hum) | float(0) %}{% set pws = 6.112 * (2.718281828 ** (17.62 * T / (243.12 + T))) %}{{ (216.7 * (RH / 100 * pws) / (273.15 + T)) | round(2) }} g/m³).

        # Wenn Ziel erreicht → Schleife verlassen (AC vorher aus!)
        - if:
            - condition: template
              value_template: >
                {% set T = states(v_room_temp) | float(99) %}
                {% set RH = states(v_room_hum) | float(100) %}
                {% set pws = 6.112 * (2.718281828 ** (17.62 * T / (243.12 + T))) %}
                {% set AH = 216.7 * (RH / 100 * pws) / (273.15 + T) %}
                {{ RH <= (v_target_rh | float) or AH <= (v_target_ah | float) }}
          then:
            - service: climate.turn_off
              target:
                entity_id: !input climate_entity
              continue_on_error: true
            - stop: "Entfeuchtungsziel erreicht."

        # Wenn Raum zu kalt oder Fenster offen → abbrechen (AC vorher aus!)
        - if:
            - condition: template
              value_template: "{{ (states(v_room_temp) | float(99) <= (v_min_room | float)) or (v_use_window | bool(false) and (v_window is string) and (v_window | length > 0) and is_state(v_window, 'on')) }}"
          then:
            - service: climate.turn_off
              target:
                entity_id: !input climate_entity
              continue_on_error: true
            - stop: "Abbruch — Raum zu kalt oder Fenster offen."

  # ────────────────────────────────────────────────────────────────────────
  # ABSCHLUSS: AC ausschalten + Benachrichtigung
  # ────────────────────────────────────────────────────────────────────────
  - service: climate.turn_off
    target:
      entity_id: !input climate_entity
    continue_on_error: true

  - variables:
      end_t: "{{ states(v_room_temp) | float(0) }}"
      end_rh: "{{ states(v_room_hum) | float(0) }}"
      end_ah: >
        {% set T = states(v_room_temp) | float(0) %}
        {% set RH = states(v_room_hum) | float(0) %}
        {% set pws = 6.112 * (2.718281828 ** (17.62 * T / (243.12 + T))) %}
        {{ (216.7 * (RH / 100 * pws) / (273.15 + T)) | round(2) }}

  - if:
      - condition: template
        value_template: "{{ v_notify != '' }}"
    then:
      - service: "{{ v_notify }}"
        data:
          title: "✅ Entfeuchten beendet"
          message: >
            Ende: {{ end_t | round(1) }} °C /
            {{ end_rh | round(0) }} % rH ({{ end_ah }} g/m³).

mode: single
max_exceeded: silent
